{% load static %}

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interface de Recherche</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    {% csrf_token %}
    <div class="container">
        <div class="section">
            <h2>Requête</h2>

                <label for="animalSelect">Choisissez un animal :</label>
                <select id="animalSelect" class="dropdown">
                    <option value="">-- Sélectionnez --</option>
                    <option value="chiens">Chiens</option>
                    <option value="singes">Singes</option>
                    <option value="poissons">Poissons</option>
                </select>

                <label for="raceSelect">Choisissez une race :</label>
                <select id="raceSelect" class="dropdown" disabled>
                    <option value="">-- Sélectionnez une race --</option>
                </select>

                <label for="imageSelect">Sélectionnez une image :</label>
                <select id="imageSelect"  name="image_name" class="dropdown" disabled>
                    <option value="">-- Sélectionnez une image --</option>
                </select>

                <h2>Images disponibles</h2>
                <div id="imagePreview" type="radio" name="image_name" class="scroll-box">
                    <!-- Les vignettes seront insérées ici -->
                </div>


            <label for="textQuery">Texte Requête :</label>
            <input type="text" id="textQuery" class="input-field" placeholder="Entrez la requête textuelle...">
        </div>

        <!-- Descripteurs -->
        <div class="section">
            <h2>Descripteurs</h2>
            <label><input type="checkbox" name="descripteur" value='BGR'> BGR</label><br>
            <label><input type="checkbox" name="descripteur" value='HSV'> HSV</label><br>
            <label><input type="checkbox" name="descripteur" value='SIFT'> SIFT</label><br>
            <label><input type="checkbox" name="descripteur" value='ORB'> ORB</label><br>
            <label><input type="checkbox" name="descripteur" value='GLCM'> GLCM</label><br>
            <label><input type="checkbox" name="descripteur" value='ViT'> ViT</label><br>
            <label><input type="checkbox" name="descripteur" value='LBP'> LBP</label><br>
            <label><input type="checkbox" name="descripteur" value='HOG'> HOG</label><br>
            <button class="btn" onclick="chargerDescripteurs()">Charger les descripteurs</button>
        </div>
             
        <!-- Recherche -->
        <div class="section">
            <h2>Recherche</h2>
            <label for="distance">Distance :</label>
            <select id="distance" class="dropdown">
                <!-- Les options seront ajoutées dynamiquement -->
            </select>

            <label>Type de recherche :</label>
            <div id="searchType">
                <label>
                    <input type="checkbox" name="searchType" value="image" class="search-type-checkbox">
                    Image
                </label>
                <br>
                <label>
                    <input type="checkbox" name="searchType" value="texte" class="search-type-checkbox">
                    Texte
                </label>
                <br>
                <label>
                    <input type="checkbox" name="searchType" value="clip" class="search-type-checkbox">
                    CLIP
                </label>
            </div>

            <div id="combinationTypeContainer" style="display: none;">
                <label for="combinationType">Type de combinaison :</label>
                <select name="combinationType" id="combinationType">
                    <option value="addition">Addition</option>
                    <option value="multiplication">Multiplication</option>
                    <option value="moyenne">Moyenne</option>
                </select>
            </div>
            
            

            <label for="topResults">Top :</label>
            <select id="topResults" class="dropdown">
                <!-- Les options seront ajoutées dynamiquement -->
            </select>
            <button class="btn" type="button" onclick="rechercher()">Rechercher</button>
            <div id="results" class="scroll-box">
                <!-- Images ajoutées dynamiquement ici -->
            </div>
            
        </div>

        <!-- Métriques -->
        <div class="section">
            <h2>Métriques images / images + texte</h2>
            <p>AP : <span id="apValue">0.0</span></p>
            <p>mAP : <span id="mapValue">0.0</span></p>
            <p>RP : <span id="rpValue">0.0</span></p>
            <button class="btn" onclick="afficherCourbe('rappel')">Courbe Rappel</button>
            <button class="btn" onclick="afficherCourbe('precision')">Courbe Précision</button>
            <canvas id="courbeRP" width="300" height="200"></canvas>
            <h2>Métriques texte</h2>
            <p>Cosine Similarity : <span id="cosine">0.0</span></p>
        </div>
    </div>
    <!-- ProgressBar -->
    <div class="progress-container" style="margin-top: 15px;">
        <label for="progress">Chargement :</label>
        <progress id="progressBar" value="0" max="100" style="width: 100%;"></progress>
        <span id="progressPercent">0%</span>
    </div>

    <footer>
        <div id="footer-container"></div>
    </footer>

    <script src="{% static 'js/script.js' %}"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="{% static 'js/footer.js' %}"></script>
</body>
</html>
